services:
  garmin-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garmin-mcp-server
    ports:
      - "8000:8000"
    # No credentials or token files needed.
    # The bearer token sent per-request IS the Garmin OAuth token (base64).
    # Generate it once with: uv run garmin-mcp-auth
    restart: unless-stopped
